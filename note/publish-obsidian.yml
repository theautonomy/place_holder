name: Publish Obsidian Vault to GitHub Pages

on:
  push:
    branches: [wiki]
    paths:
      - 'wiki/**'
      - '.github/workflows/publish-obsidian.yml'
      - '.github/quartz/quartz.config.ts'
      - '.github/quartz/quartz.layout.ts'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: git clone https://github.com/jackyzha0/quartz.git --depth 1 --branch v4.5.2 /tmp/quartz

      - name: Install Quartz dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Copy vault content to Quartz
        run: |
          rm -rf /tmp/quartz/content
          mkdir -p /tmp/quartz/content
          rsync -a --exclude='*.canvas' --exclude='.obsidian' wiki/ /tmp/quartz/content/
          # Quartz home page must be lowercase index.md
          # mv /tmp/quartz/content/Index.md /tmp/quartz/content/index.md
          echo "=== Content files ==="
          find /tmp/quartz/content -type f | sort

      - name: Apply Tokyo Night theme config
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          sed \
            -e "s|__TITLE__|Human's Best Friend|g" \
            -e "s|__BASEURL__|${OWNER}.github.io/${REPO}|g" \
            .github/quartz/quartz.config.ts > /tmp/quartz/quartz.config.ts
          echo "=== baseUrl: ${OWNER}.github.io/${REPO} ==="

      - name: Apply custom layout
        run: |
          cp .github/quartz/quartz.layout.ts /tmp/quartz/quartz.layout.ts

      - name: Apply custom CSS overrides
        run: |
          cp .github/quartz/custom.scss /tmp/quartz/quartz/styles/custom.scss

      - name: Build Quartz site
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
